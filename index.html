<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="stars"></div>
    <div id="hearts"></div>

    <!-- Background -->
    <div id="background"></div>

    <!-- Intro -->
    <section id="intro">

        <h1>
            Happy Birthday,<br>
            My Favorite Person ❤️
        </h1>

        <p>
            This isn't just a website...
            <br><br>
            it's a little piece of my heart,
            made especially for you.
        </p>

        <button id="playBtn">
            ▶ Play the Movie
        </button>

    </section>

    <!-- Loading Screen -->
    <section id="loading">

        <h2>🎧 Wear your headphones...</h2>

        <p>The movie is about to begin.</p>

    </section>

    <!-- Movie -->
    <!-- Movie -->
    <section id="movie">

        <div id="sceneContainer">

            <h2 id="sceneTitle"></h2>

            <img
            id="photo"
            src="assets/images/your-photo.jpg"
            alt="Ghadeer">

            <p id="sceneText"></p>

        </div>

    </section>

    <audio id="music">

        <source src="assets/music/golden-brown.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

    <section id="ending">

        <h1>A Letter From My Heart ❤️</h1>

        <div id="finalLetter"></div>


    </section>

</body>

</html>
